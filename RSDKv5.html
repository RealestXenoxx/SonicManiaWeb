<!doctype html>
<!--suppress HtmlFormInputWithoutLabel, JSDeprecatedSymbols -->
<html lang="en-us">
	<head>
		<script src="coi-serviceworker.js"></script>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />

		<title>Sonic Mania</title>

		<link type="text/css" rel="stylesheet" href="css/fonts.css" />
		<style type="text/css">
			html, body {
				font-family: arial, sans-serif;
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background-color: #000;
				text-align: center;
			}

			/*noinspection CssInvalidPropertyValue,CssOverwrittenProperties*/
			canvas {
				height: 100%;
				margin: auto;
				padding: 0;
				border: 0 none;
				background-color: #000;
				-ms-interpolation-mode: nearest-neighbor;
				image-rendering: optimizeSpeed;
				image-rendering: -webkit-optimize-contrast;
				image-rendering: -moz-crisp-edges;
				image-rendering: -o-crisp-edges;
				image-rendering: crisp-edges;
				image-rendering: pixelated;
			}

			.spinner {
				height: 40px;
				width: 40px;
				margin: 0 auto 15px auto;
				display: block;

				-webkit-animation: rotation .8s linear infinite;
				-moz-animation: rotation .8s linear infinite;
				-o-animation: rotation .8s linear infinite;
				animation: rotation 0.8s linear infinite;

				border-left: 6px solid rgb(235, 235, 235);
				border-right: 6px solid rgb(235, 235, 235);
				border-bottom: 6px solid rgb(235, 235, 235);
				border-top: 6px solid rgb(120, 120, 120);

				border-radius: 100%;
				background-color: rgb(189, 215, 46);
			}

			@-webkit-keyframes rotation {
				from { -webkit-transform: rotate(0deg); }
				to { -webkit-transform: rotate(360deg); }
			}
			@-moz-keyframes rotation {
				from { -moz-transform: rotate(0deg); }
				to { -moz-transform: rotate(360deg); }
			}
			@-o-keyframes rotation {
				from { -o-transform: rotate(0deg); }
				to { -o-transform: rotate(360deg); }
			}
			@keyframes rotation {
				from { transform: rotate(0deg); }
				to { transform: rotate(360deg); }
			}

			#status {
				font-weight: bold;
				color: rgb(180, 180, 180);
				margin: 10px 0;
			}

			#progress {
				height: 22px;
				width: 420px;
				margin: 15px auto;
				display: block;
				border-radius: 4px;
				background: #333;
				border: 2px solid #555;
			}

			#progress::-webkit-progress-bar {
				background: #333;
				border-radius: 4px;
			}
			#progress::-webkit-progress-value {
				background: linear-gradient(to right, #00bfff, #00ffcc);
				border-radius: 4px;
			}

			.loading-container {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				width: 100%;
				position: fixed;
				top: 0;
				left: 0;
				z-index: 100;
				background-color: rgba(0, 0, 0, 0.95);
				pointer-events: none;
			}

			#output {
				width: 100%;
				height: 200px;
				margin: 10px auto 0;
				display: none;
				background-color: black;
				color: white;
				font-family: 'Lucida Console', Monaco, monospace;
			}
		</style>
	</head>
	<body>
		<!-- Centered Loading Screen -->
		<div class="loading-container" id="loadingContainer">
			<div class="spinner" id="spinner"></div>
			<div id="status">Downloading...</div>
			<progress id="progress" value="0" max="100"></progress>
		</div>

		<!-- Game Canvas -->
		<canvas id="canvas" onclick="window.focus();" oncontextmenu="event.preventDefault();"></canvas>
		<textarea id="output" rows="8"></textarea>

		<script type="text/javascript">
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(registration) {
            registration.addEventListener('updatefound', function() {
                var installingWorker = registration.installing;
                console.log('A new service worker is being installed:', installingWorker);
            });
        }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
        });
    }

    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement = document.getElementById('spinner');
    var loadingContainer = document.getElementById('loadingContainer');

    function hideLoader() {
        loadingContainer.style.opacity = "0";
        setTimeout(() => {
            loadingContainer.style.display = "none";
        }, 300);
    }

    var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
            var element = document.getElementById('output');
            return function (text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
                if (element) {
                    element.value += text + "\n";
                    element.scrollTop = element.scrollHeight;
                }
            };
        })(),
        printErr: function (text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
        canvas: (function () {
            var canvas = document.getElementById('canvas');
            canvas.addEventListener("webglcontextlost", function (e) {
                alert('WebGL context lost. You will need to reload the page.');
                e.preventDefault();
            }, false);
            return canvas;
        })(),
        setStatus: function (text) {
            if (!Module.setStatus.last) Module.setStatus.last = {time: Date.now(), text: ''};
            if (text === Module.setStatus.last.text) return;

            var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
            var now = Date.now();
            if (m && now - Module.setStatus.last.time < 30) return;

            Module.setStatus.last.time = now;
            Module.setStatus.last.text = text;

            if (m) {
                text = m[1].trim();
                progressElement.value = parseInt(m[2]) * 100;
                progressElement.max = parseInt(m[4]) * 100;
                progressElement.hidden = false;
            } else {
                progressElement.hidden = true;
            }

            statusElement.innerHTML = text || 'Loading...';

            // Hide loader when downloads finish
            if (text === "All downloads complete.") {
                hideLoader();
            }
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
    };

    // Hide loader when WASM runtime is ready
    Module.onRuntimeInitialized = function () {
        hideLoader();
    };

    Module.setStatus('Downloading...');

    window.onerror = function () {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function (text) {
            if (text) Module.printErr('[post-exception status] ' + text);
        };
    };
</script>
		<script src="discord-presence.js"></script>
		<script async="async" defer="defer" type="text/javascript" src="RSDKv5.js"></script>
	</body>
</html>
